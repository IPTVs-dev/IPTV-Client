<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Client Support</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            text-align: center;
            margin: 0;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 40px 20px;
            min-height: 100vh;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5em;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            font-size: 1.1em;
            color: #f0f0f0;
        }
        video {
            width: 100%;
            height: auto;
            margin: 30px 0;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #000;
            display: block;
        }
        .support-info {
            margin-top: 40px;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            display: inline-block;
            width: 85%;
            max-width: 600px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }
        .support-info h2 {
            color: #667eea;
            margin-top: 0;
            font-size: 1.5em;
        }
        .support-info p {
            color: #555;
        }
        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #764ba2;
        }
        img {
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>IPTV Client Support</h1>
    <p>Watch the video below:</p>
    <video controls autoplay>
        <source src="assets/iptvs.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="support-info">
        <h2>Get Support</h2>
        <p>For issues or questions, please visit our App Store page or contact us via email.</p>
        <p><a href="https://apps.apple.com/us/app/iptvs/id6757697493" target="_blank"><img src="https://developer.apple.com/app-store/marketing/guidelines/images/badge-example-alternate.png" alt="Download on the App Store" style="height: 40px;"></a></p>
        <p>Email: <a href="mailto:iptvdev06@gmail.com">iptvdev06@gmail.com</a></p>
    </div>
</body>
</html>
